name: Build Launcher

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build launcher
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          cl /O2 /MT /DUNICODE /D_UNICODE /EHsc /Fe:"Your Game.exe" Launcher.cpp user32.lib /link /SUBSYSTEM:WINDOWS

      - name: Upload launcher
        uses: actions/upload-artifact@v4
        with:
          name: launcher-exe
          path: Your Game.exe
